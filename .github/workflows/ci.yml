name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall -q backend gui tests meeting_assistant.py start.py test_regex.py test_gemini.py scripts

      - name: Security scan
        run: python scripts/security_scan.py

      - name: Quality consistency audit
        run: python scripts/audit_quality_consistency.py

      - name: Unit tests
        run: python -m unittest discover -v

      - name: Dependency check
        run: python -m pip check
